<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Advisory Panel - StoneFly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe',
              500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>

<body class="h-screen flex overflow-hidden font-sans bg-gray-950">

  <!-- ─── Mobile Overlay ─────────────────────────────────────────────────────── -->
  <div id="mobile-overlay" class="fixed inset-0 bg-black/60 z-30 hidden md:hidden transition-opacity"
    onclick="toggleSidebar()"></div>

  <!-- ─── Sidebar (ChatGPT Style) ────────────────────────────────────────────── -->
  <aside id="sidebar"
    class="bg-gray-950 border-r border-gray-800 fixed inset-y-0 left-0 z-40 transform -translate-x-full lg:relative lg:translate-x-0 transition-all duration-300 ease-in-out w-64 collapsed overflow-hidden flex flex-col">

    <!-- Top Action: Toggle -->
    <div class="px-3 py-3 h-14 flex items-center">
      <button onclick="toggleSidebar()"
        class="w-full flex items-center px-2.5 py-2.5 text-gray-500 hover:text-white hover:bg-white/10 rounded-lg transition-colors focus:outline-none"
        title="Toggle Sidebar">
        <div class="w-5 h-5 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
            <line x1="9" x2="9" y1="3" y2="21" />
          </svg>
        </div>
      </button>
    </div>

    <!-- Navigation List -->
    <nav class="flex-1 px-3 space-y-1">
      <!-- New chat -->
      <button onclick="clearSession()"
        class="w-full flex items-center gap-3 px-2.5 py-2.5 text-sm text-gray-300 hover:bg-white/5 rounded-lg transition-colors group"
        title="New chat">
        <div class="w-5 h-5 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
            <path d="M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
        </div>
        <span class="nav-label truncate opacity-0 transition-opacity">New chat</span>
      </button>

      <!-- Preset Selection -->
      <button onclick="showPresetsLibrary()"
        class="w-full flex items-center gap-3 px-2.5 py-2.5 text-sm text-gray-300 hover:bg-white/5 rounded-lg transition-colors group"
        title="Preset Library">
        <div class="w-5 h-5 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path
              d="M9.5 2A1.5 1.5 0 0 0 8 3.5v7A1.5 1.5 0 0 0 9.5 12H11l3 3 3-3h1.5a1.5 1.5 0 0 0 1.5-1.5v-7A1.5 1.5 0 0 0 18.5 2h-9zM4.5 7A1.5 1.5 0 0 0 3 8.5v7A1.5 1.5 0 0 0 4.5 17H6l3 3 3-3h1.5a1.5 1.5 0 0 0 1.5-1.5v-7A1.5 1.5 0 0 0 10.5 7h-6z" />
          </svg>
        </div>
        <span class="nav-label truncate opacity-0 transition-opacity">Preset Library</span>
      </button>

      <!-- History (Clock) -->
      <button
        class="w-full flex items-center gap-3 px-2.5 py-2.5 text-sm text-gray-300 hover:bg-white/5 rounded-lg transition-colors group"
        title="History">
        <div class="w-5 h-5 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
        </div>
        <span class="nav-label truncate opacity-0 transition-opacity">History</span>
      </button>
    </nav>

    <!-- Bottom Branding (only when open) -->
    <div class="p-4 border-t border-gray-800 nav-label opacity-0 transition-opacity">
      <div class="flex items-center gap-3">
        <div
          class="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center flex-shrink-0 shadow-lg shadow-brand-600/20">
          <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
          </svg>
        </div>
        <div class="min-w-0">
          <div class="text-white text-xs font-semibold truncate">StoneFly Advisor</div>
          <div class="text-gray-500 text-[10px] truncate">Configurator v2.0</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ─── Chat Area ─────────────────────────────────────────────────────────── -->
  <main id="main-content" class="flex-1 flex flex-col bg-white overflow-hidden w-full relative">

    <!-- Top Bar: Sticky Quote Loader -->
    <div class="sticky top-0 z-30 bg-white/95 backdrop-blur-md border-b border-gray-100 px-4 md:px-6 py-3 shadow-sm">
      <div class="max-w-6xl mx-auto flex items-center gap-4">

        <!-- Mobile Toggle -->
        <button onclick="toggleSidebar()"
          class="lg:hidden p-2 text-gray-500 hover:text-brand-600 hover:bg-gray-50 rounded-xl transition-all">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>



        <!-- Quote Input and Button -->
        <div class="flex items-center gap-2 flex-1 max-w-md">
          <div class="relative flex-1">
            <input id="quote-input" type="text" placeholder="Enter Quote #..."
              class="w-full bg-gray-100/50 border border-transparent focus:bg-white focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 rounded-xl px-4 py-2 text-sm text-gray-800 placeholder-gray-500 transition-all outline-none" />
            <div id="quote-error" class="absolute left-0 -bottom-4 text-[10px] text-red-500 font-medium hidden"></div>
          </div>
          <button id="load-btn" onclick="loadQuote()"
            class="bg-brand-600 hover:bg-brand-700 text-white text-xs font-bold uppercase tracking-wider px-4 py-2.5 rounded-xl transition-all flex-shrink-0 flex items-center gap-2 active:scale-95 shadow-none ring-0">
            <span id="load-btn-text">Load</span>
            <span id="load-spinner" class="hidden spinner-white"></span>
          </button>
        </div>

        <!-- Divider -->
        <div class="hidden md:block w-px h-6 bg-gray-200 mx-2"></div>

        <!-- Config Status -->
        <div id="config-status" class="hidden flex-1 flex items-center gap-3 overflow-hidden">
          <div
            class="flex items-center gap-1.5 shrink-0 bg-green-50 text-green-700 px-3 py-1.5 rounded-lg border border-green-100">
            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
            <span id="config-quote-label" class="text-xs font-bold font-mono"></span>
          </div>
          <div id="config-chips-scroll" class="flex-1 overflow-x-auto">
            <div id="config-chips" class="flex gap-1.5 py-1"></div>
          </div>
        </div>

      </div>
    </div>



    <!-- Messages -->
    <div id="chat-messages" class="flex-1 overflow-y-auto">

      <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center px-8">
        <!-- Instructional Badge -->
        <div class="mb-10">
          <span id="empty-state-badge"
            class="inline-flex items-center px-4 py-1.5 rounded-full bg-gray-50 text-gray-500 text-[10px] font-bold uppercase tracking-widest border border-gray-200/50 shadow-sm transition-all duration-300">
            Load a Quote Number to begin analysis
          </span>
        </div>


        <!-- Suggested Presets (Preview) -->
        <div id="empty-state-presets" class="w-full max-w-4xl flex flex-col gap-3 mb-8">
          <!-- Populated via app.js -->
        </div>

        <button onclick="showPresetsLibrary()"
          class="text-brand-600 hover:text-brand-700 text-sm font-semibold flex items-center gap-2 transition-all group px-4 py-2 hover:bg-brand-50 rounded-full">
          <span>Explore all analysis presets</span>
          <svg class="w-4 h-4 transform group-hover:translate-x-0.5 transition-transform" fill="none"
            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
          </svg>
        </button>
      </div>

      <!-- Messages container -->
      <div id="messages-container" class="hidden px-6 py-6 space-y-6 max-w-4xl mx-auto w-full pb-4"></div>


    </div>

    <!-- Input Bar -->
    <div class="border-t border-gray-100 bg-white px-6 py-4">
      <div class="max-w-4xl mx-auto">
        <div class="flex gap-3 items-end">
          <div class="flex-1 relative">
            <textarea id="custom-input" placeholder="Ask a custom question…" rows="1"
              class="w-full border border-gray-200 rounded-2xl px-4 py-3 pr-4 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-blue-100 resize-none transition-colors bg-gray-50 focus:bg-white"
              style="max-height: 140px;"></textarea>
          </div>
          <button id="custom-btn" onclick="askCustom()"
            class="flex-shrink-0 w-10 h-10 bg-brand-600 hover:bg-brand-700 disabled:opacity-40 disabled:cursor-not-allowed text-white rounded-xl transition-colors flex items-center justify-center shadow-sm">
            <span id="custom-spinner" class="hidden spinner-white-sm"></span>
            <svg id="send-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
          </button>
        </div>
        <div class="mt-2 text-xs text-gray-400 text-center">
          Press <kbd class="bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded text-xs font-mono">Enter</kbd> to send
          &nbsp;·&nbsp; <kbd class="bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded text-xs font-mono">Shift+Enter</kbd>
          for new line
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>

  <!-- ─── Fullscreen Preset Library Overlay ────────────────────────────────────── -->
  <div id="presets-library"
    class="hidden fixed inset-0 z-[60] bg-gray-950/95 backdrop-blur-md overflow-hidden flex flex-col">
    <!-- Close Button -->
    <button onclick="hideEl('presets-library')"
      class="absolute top-8 right-8 text-gray-400 hover:text-white transition-colors p-2 bg-white/5 hover:bg-white/10 rounded-full z-10"
      title="Close Library">
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <div class="flex-1 overflow-y-auto px-6 py-20">
      <div class="max-w-6xl mx-auto">
        <div class="flex items-center gap-5 mb-12">
          <div
            class="w-14 h-14 rounded-2xl bg-brand-600 flex items-center justify-center shadow-2xl shadow-brand-600/40">
            <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path
                d="M9.5 2A1.5 1.5 0 0 0 8 3.5v7A1.5 1.5 0 0 0 9.5 12H11l3 3 3-3h1.5a1.5 1.5 0 0 0 1.5-1.5v-7A1.5 1.5 0 0 0 18.5 2h-9zM4.5 7A1.5 1.5 0 0 0 3 8.5v7A1.5 1.5 0 0 0 4.5 17H6l3 3 3-3h1.5a1.5 1.5 0 0 0 1.5-1.5v-7A1.5 1.5 0 0 0 10.5 7h-6z" />
            </svg>
          </div>
          <div>
            <h2 class="text-3xl font-bold text-white tracking-tight">AI Advisory Library</h2>
            <p class="text-gray-400 text-base mt-1">Select a configuration analysis preset to run against your quote.
            </p>
          </div>
        </div>

        <div id="library-grid" class="flex flex-col gap-4 max-w-4xl mx-auto">
          <!-- Dynamically populated via app.js -->
        </div>
      </div>
    </div>
  </div>
</body>

</html>
