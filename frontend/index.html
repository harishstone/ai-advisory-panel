<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Advisory Panel — StoneFly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe',
              500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="h-screen flex overflow-hidden font-sans bg-gray-950">

  <!-- ─── Sidebar ──────────────────────────────────────────────────────────── -->
  <aside class="w-72 flex-shrink-0 flex flex-col bg-gray-950 border-r border-gray-800">

    <!-- Branding -->
    <div class="px-4 pt-5 pb-4 border-b border-gray-800">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-brand-600 flex items-center justify-center flex-shrink-0 shadow-lg shadow-brand-600/30">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
          </svg>
        </div>
        <div>
          <div class="text-white text-sm font-semibold leading-tight">AI Advisory Panel</div>
          <div class="text-gray-500 text-xs mt-0.5">StoneFly Configurator</div>
        </div>
      </div>
    </div>

    <!-- Quote Loader -->
    <div class="px-3 py-3 border-b border-gray-800">
      <div class="text-gray-500 text-xs font-medium mb-2 px-1 uppercase tracking-wider">Quote</div>
      <div class="flex gap-2">
        <input
          id="quote-input"
          type="text"
          placeholder="Enter quote number…"
          class="flex-1 min-w-0 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors"
        />
        <button
          id="load-btn"
          onclick="loadQuote()"
          class="bg-brand-600 hover:bg-brand-700 text-white text-xs font-semibold px-3 py-2 rounded-lg transition-colors flex-shrink-0 flex items-center gap-1.5 shadow-sm"
        >
          <span id="load-btn-text">Load</span>
          <span id="load-spinner" class="hidden spinner-white"></span>
        </button>
      </div>
      <div id="quote-error" class="hidden mt-2 text-xs text-red-400 px-1"></div>

      <!-- Config status chips -->
      <div id="config-status" class="hidden mt-3 px-1">
        <div class="flex items-center gap-1.5 mb-2">
          <span class="w-1.5 h-1.5 bg-green-400 rounded-full"></span>
          <span id="config-quote-label" class="text-xs text-green-400 font-medium font-mono"></span>
        </div>
        <div id="config-chips" class="flex flex-wrap gap-1"></div>
      </div>
    </div>

    <!-- Preset Questions -->
    <div class="flex-1 overflow-y-auto py-3 min-h-0">
      <div class="text-gray-500 text-xs font-medium mb-1.5 px-4 uppercase tracking-wider">Preset Questions</div>
      <div id="questions-list" class="px-2 space-y-0.5">
        <div class="text-gray-600 text-xs px-2 py-3">Loading…</div>
      </div>
    </div>

    <!-- New Session -->
    <div class="px-3 py-3 border-t border-gray-800">
      <button
        onclick="clearSession()"
        class="w-full flex items-center gap-2.5 px-3 py-2 text-sm text-gray-500 hover:text-gray-200 hover:bg-gray-800 rounded-lg transition-colors"
      >
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
        New Session
      </button>
    </div>
  </aside>

  <!-- ─── Chat Area ─────────────────────────────────────────────────────────── -->
  <main class="flex-1 flex flex-col bg-white overflow-hidden">

    <!-- Messages -->
    <div id="chat-messages" class="flex-1 overflow-y-auto">

      <!-- Empty state -->
      <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center px-8">
        <div class="w-16 h-16 rounded-2xl bg-blue-50 flex items-center justify-center mb-5">
          <svg class="w-8 h-8 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
          </svg>
        </div>
        <h3 class="text-gray-800 font-semibold text-lg mb-2">StoneFly AI Advisory Panel</h3>
        <p class="text-gray-400 text-sm max-w-sm leading-relaxed">
          Load a quote number from the sidebar to get started, then choose from the preset questions or type your own.
        </p>
      </div>

      <!-- Messages container -->
      <div id="messages-container" class="hidden px-6 py-6 space-y-6 max-w-4xl mx-auto w-full pb-4"></div>
    </div>

    <!-- Input Bar -->
    <div class="border-t border-gray-100 bg-white px-6 py-4">
      <div class="max-w-4xl mx-auto">
        <div class="flex gap-3 items-end">
          <div class="flex-1 relative">
            <textarea
              id="custom-input"
              placeholder="Ask a custom question about this appliance configuration…"
              rows="1"
              class="w-full border border-gray-200 rounded-2xl px-4 py-3 pr-4 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-blue-100 resize-none transition-colors bg-gray-50 focus:bg-white"
              style="max-height: 140px;"
            ></textarea>
          </div>
          <button
            id="custom-btn"
            onclick="askCustom()"
            class="flex-shrink-0 w-10 h-10 bg-brand-600 hover:bg-brand-700 disabled:opacity-40 disabled:cursor-not-allowed text-white rounded-xl transition-colors flex items-center justify-center shadow-sm"
          >
            <span id="custom-spinner" class="hidden spinner-white-sm"></span>
            <svg id="send-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
          </button>
        </div>
        <div class="mt-2 text-xs text-gray-400 text-center">
          Press <kbd class="bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded text-xs font-mono">Enter</kbd> to send &nbsp;·&nbsp; <kbd class="bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded text-xs font-mono">Shift+Enter</kbd> for new line
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
