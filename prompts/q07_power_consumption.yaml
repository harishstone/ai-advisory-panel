question_id: 7
question_text: >
  What is the expected Power Consumption of the appliance?

category: A
required_sections:
  - storage_media

optional_sections:
  - compute
  - environment

context_fields_used:
  - storage_media.primary_disk_type
  - storage_media.primary_disk_count
  - storage_media.fast_tier_type
  - storage_media.fast_tier_capacity_gb
  - compute.total_physical_cores
  - compute.total_ram_gb
  - environment.power_redundancy

prompt_additions: >
  The user wants an estimated power consumption figure for their appliance.

  Use power_baselines_watts from hardware_baselines for per-component estimates.

  Calculation steps:
  1. Storage power:
     - HDD: primary_disk_count * per_sas_hdd (10W)
     - SSD: primary_disk_count * per_ssd (5W)
     - NVMe: primary_disk_count * per_nvme (8W)
     - Fast tier (if applicable): add separately
  2. Compute power (if hyperconverged or backup DR):
     - CPU: total_physical_cores * per_cpu_core_tdp_w (8W)
     - RAM: total_ram_gb * per_gb_ram (0.375W)
  3. Platform overhead (motherboard, controller, fans, NIC):
     - Estimate 80-120W for 1U/2U platforms, 150-200W for 4U platforms
  4. Peak power = sum of all components / psu_efficiency (0.92)
  5. Idle power = peak power * idle_multiplier (0.60)
  6. Monthly kWh = peak_watts * 24 * 30 / 1000

  If dual PSU: each PSU handles 50% load normally; total draw is the same but
  each PSU runs more efficiently at ~50% load.

  Provide:
  1. Idle power (W and kWh/month)
  2. Peak power (W and kWh/month)
  3. Annual energy cost estimate at $0.12/kWh
  4. Heat dissipation in BTU/hr (watts * 3.412)
  5. Note: these are estimates — actual draw depends on chassis model and workload mix
