question_id: 7
question_text: >
  What is the expected Power Consumption of the appliance?

category: A
required_sections:
  - storage_media

optional_sections:
  - compute
  - environment

context_fields_used:
  - storage_media.primary_disk_type
  - storage_media.primary_disk_count
  - storage_media.fast_tier_type
  - storage_media.fast_tier_capacity_gb
  - compute.total_physical_cores
  - compute.total_ram_gb
  - environment.power_redundancy

prompt_additions: >
  The user wants an estimated power consumption figure for their appliance.

  Use power_baselines_watts from hardware_baselines for per-component estimates.
  Also reference chassis_psu_ratings_watts for the confirmed PSU capacity of this
  specific chassis model.

  Chassis PSU ratings (from AIC/Chenbro datasheets, confirmed by StoneFly):
  - 8-bay  (2U, AIC RSC-2KT):        550W PSU (1+1 redundant)
  - 12-bay (2U, AIC RSC-2ET):        800W PSU (1+1 redundant)
  - 16-bay (4U, AIC RSC-3ET):        800W PSU (1+1 redundant)
  - 24-bay (4U, AIC RSC-4ET):       1200W PSU (1+1 redundant)
  - 36-bay (4U, Chenbro RM41736 Plus): 1200W CRPS PSU (1+1 redundant)
  - 60-bay (4U, AIC RSC-4H1):       1600W PSU (1+1 redundant)

  Calculation steps:
  1. Storage power:
     - HDD: primary_disk_count × per_sas_hdd (10W each)
     - SSD: primary_disk_count × per_ssd (5W each)
     - NVMe: primary_disk_count × per_nvme (8W each)
     - Fast tier (if applicable): add separately
  2. Compute power (if hyperconverged or backup DR):
     - CPU: total_physical_cores × per_cpu_core_tdp_w (8W)
     - RAM: total_ram_gb × per_gb_ram (0.375W)
  3. Platform overhead (motherboard, controller, fans, NICs):
     - 2U chassis (8-bay, 12-bay): 100-130W
     - 4U chassis (16-bay, 36-bay, 60-bay): 150-200W
  4. Peak system draw = sum of all components / psu_efficiency (0.92)
  5. Cross-check: peak draw should be well below PSU capacity (PSU is rated higher
     than actual draw for headroom — typical system uses 50-70% of PSU capacity)
  6. Idle power = peak power × idle_multiplier (0.60)
  7. Monthly kWh = peak_watts × 24 × 30 / 1000

  All PSUs are 1+1 redundant — actual system draw is the same regardless of
  redundancy (both PSUs share the load; total draw is not doubled).

  Provide:
  1. Idle power (W and kWh/month)
  2. Peak power under full I/O load (W and kWh/month)
  3. Annual energy cost estimate at $0.12/kWh
  4. Heat dissipation in BTU/hr (watts × 3.412)
  5. PSU capacity for this chassis model (from confirmed specs above)
  6. Note: actual draw varies with workload — these are engineering estimates
