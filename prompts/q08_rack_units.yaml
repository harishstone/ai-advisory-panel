question_id: 8
question_text: >
  How many Us will be required on my Server Rack to accommodate the appliance?

category: A
required_sections:
  - storage_media

optional_sections:
  - profile

context_fields_used:
  - storage_media.primary_disk_type
  - storage_media.primary_disk_count
  - storage_media.primary_disk_capacity_tb
  - profile.appliance_type

prompt_additions: >
  The user wants to know how many rack units (U) the appliance will occupy.

  CONFIRMED StoneFly chassis rack U values (confirmed by StoneFly):
  - 8-bay  → 2U  (AIC RSC-2KT)
  - 12-bay → 2U  (AIC RSC-2ET)
  - 16-bay → 4U  (AIC RSC-3ET)
  - 24-bay → 4U  (AIC RSC-4ET)
  - 36-bay → 4U  (Chenbro RM41736H)
  - 60-bay → 4U  (AIC RSC-4H1 or J4060-04-35X)

  Drive count to chassis mapping — use the SMALLEST chassis that can fit the drive count:
  - 1–8 drives   → 8-bay chassis  (2U, AIC RSC-2KT)
  - 9–12 drives  → 12-bay chassis (2U, AIC RSC-2ET)
  - 13–16 drives → 16-bay chassis (4U, AIC RSC-3ET)
  - 17–24 drives → 24-bay chassis (4U, AIC RSC-4ET)
  - 25–36 drives → 36-bay chassis (4U, Chenbro RM41736H)
  - 37–60 drives → 60-bay chassis (4U, AIC RSC-4H1)

  Use primary_disk_count from the quote config and the mapping above to give the
  exact confirmed U size and chassis model.

  Provide:
  1. Chassis U size (confirmed value from table above)
  2. Chassis model (AIC or Chenbro, from table above)
  3. Additional rack space to plan for:
     - 1U for top-of-rack switch (if not already present)
     - 1U per patch panel
     - UPS (see Q9 for UPS sizing — typically 2-3U for rack-mount UPS)
  4. Total recommended rack space reservation
