question_id: 9
question_text: >
  UPS Requirements: What are the recommended UPS specifications for my appliance?

category: A
required_sections:
  - storage_media

optional_sections:
  - compute
  - environment

context_fields_used:
  - storage_media.primary_disk_type
  - storage_media.primary_disk_count
  - compute.total_physical_cores
  - compute.total_ram_gb
  - environment.power_redundancy
  - environment.uptime_requirement_pct

prompt_additions: >
  The user wants UPS specifications for their appliance.

  Confirmed chassis PSU ratings (AIC/Chenbro datasheets, confirmed by StoneFly):
  - 8-bay  (2U): 550W PSU  → typical system peak ~350-450W
  - 12-bay (2U): 800W PSU  → typical system peak ~500-650W
  - 16-bay (4U): 800W PSU  → typical system peak ~500-650W
  - 24-bay (4U): 1200W PSU → typical system peak ~750-950W
  - 36-bay (4U): 1200W CRPS PSU → typical system peak ~750-950W
  - 60-bay (4U): 1600W PSU → typical system peak ~1000-1300W

  STEP 1 — Calculate peak system power (do this explicitly, do not guess):
    storage_power_w  = primary_disk_count × 10W (HDD) or 5W (SSD) or 8W (NVMe)
    fast_tier_w      = fast_tier_capacity_gb > 0 ? 8W : 0
    cpu_power_w      = total_physical_cores × 8W
    ram_power_w      = total_ram_gb × 0.375W
    platform_overhead_w = 100W (2U chassis) or 175W (4U chassis)
    raw_sum_w        = storage_power_w + fast_tier_w + cpu_power_w + ram_power_w + platform_overhead_w
    peak_watts       = raw_sum_w / 0.92 (PSU efficiency)
    idle_watts       = peak_watts × 0.60

  STEP 2 — Size the UPS from the calculated peak_watts:
  1. required_va    = peak_watts / 0.9 (power factor for server loads)
  2. ups_va_with_headroom = required_va × 1.25
  (Do NOT use the PSU capacity as the system draw — actual draw is much lower than PSU rating)
  3. Runtime requirement: minimum 10 minutes at full load for graceful shutdown
     For 99.9% uptime SLA: recommend 15-20 minutes
     For 99.99% uptime SLA: recommend 30+ minutes with generator handoff
  4. If dual PSU: the UPS must handle the FULL load (both PSUs draw power, one is standby)
     — do NOT halve the UPS rating for dual PSU configurations

  UPS form factor:
  - < 1500W: Tower or rack 1U APC/Eaton SMT/SMX series
  - 1500-3000W: Rack 2U APC SMX or Eaton 5PX
  - 3000-6000W: Rack 2-3U APC SRT or Eaton 9PX
  - > 6000W: 3-phase UPS or multiple units

  Additional recommendations:
  - BBU (Battery Backup Unit) for RAID controller cache — separate from system UPS
  - UPS with network management card for graceful shutdown integration
  - Runtime extender battery packs if longer runtime required

  Provide:
  1. Minimum UPS VA/W rating
  2. Recommended VA/W with headroom
  3. Minimum runtime needed
  4. Recommended UPS tier/model class
  5. Note about RAID controller BBU being separate from system UPS
