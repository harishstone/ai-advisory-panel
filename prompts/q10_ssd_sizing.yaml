question_id: 10
question_text: >
  SSD Sizing: What size of SSD resources is needed for an SNSD S3 volume
  with a capacity of 100 TB?

category: A
required_sections:
  - profile

optional_sections:
  - storage_config

context_fields_used:
  - profile.total_usable_capacity_tb
  - storage_config.deduplication_enabled
  - storage_config.dedup_ratio
  - storage_config.raid_level

prompt_additions: >
  The user wants to know how much SSD/NVMe is required for the metadata index tier
  of an SNSD S3 volume backed by HDD storage (default example: 100 TB usable HDD).

  SNSD S3 architecture: HDD stores the data objects; SSD/NVMe stores the metadata index.
  These are two separate resource pools — the question asks only about the SSD metadata tier.

  Use snsd_s3_ssd_metadata from hardware_baselines (StoneFly release notes):
  - With Veeam compression enabled (recommended): 10 GiB NVMe per 1 TiB HDD
  - Without compression: 5 GiB NVMe per 1 TiB HDD
  - Veeam compression is the default and recommended setting; use 10 GiB/TiB as the baseline.

  Step 1: SSD metadata tier size
    hdd_capacity_tib = total usable HDD storage (from profile.total_usable_capacity_tb or user input)
    ssd_metadata_gib = hdd_capacity_tib * 10  (with Veeam compression)
    ssd_metadata_gib = hdd_capacity_tib * 5   (without compression, informational)

  Step 2: RAID overhead on the SSD metadata pool
    Apply usable_ratio from raid_multipliers for the configured RAID level on the SSD tier:
    - RAID1: physical = ssd_metadata_gib / 0.50
    - RAID5 (n drives): physical = ssd_metadata_gib / ((n-1)/n)
    - RAID6 (n drives): physical = ssd_metadata_gib / ((n-2)/n)
    - RAID10: physical = ssd_metadata_gib / 0.50
    If no RAID level provided, show RAID5 and RAID6 examples.

  Step 3: Hot spare
    Add one drive worth of capacity for hot spare (if applicable).

  Show complete worked example with the user's specified HDD capacity (or 100 TiB default):
  1. HDD usable capacity: N TiB
  2. SSD metadata tier (with compression): N * 10 GiB = X GiB
  3. SSD metadata tier (without compression): N * 5 GiB = Y GiB (informational)
  4. After RAID overhead on SSD tier: final physical SSD required
  5. Suggested SSD drive configuration: e.g., "4x 1TB NVMe SSDs in RAID5"
  6. Note: use NVMe (not SATA SSD) for the metadata tier — lower latency is critical for index lookups
