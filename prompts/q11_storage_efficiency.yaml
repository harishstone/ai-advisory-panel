question_id: 11
question_text: >
  Storage Efficiency: What storage savings can be achieved using deduplication
  with different settings?

category: A
required_sections:
  - storage_config
  - profile

optional_sections:
  - storage_media

context_fields_used:
  - storage_config.deduplication_enabled
  - storage_config.dedup_ratio
  - storage_config.compression_enabled
  - storage_config.compression_algorithm
  - storage_config.thin_provisioning
  - profile.primary_workloads
  - profile.total_usable_capacity_tb

prompt_additions: >
  The user wants to understand storage savings from deduplication (and compression).

  Use dedup_ratios from hardware_baselines, keyed by workload type:
  - veeam_backup_data: typical 2.5:1, best 5.0:1, worst 1.2:1
  - vm_workloads: typical 3.0:1, best 8.0:1, worst 1.5:1
  - database_data: typical 1.5:1, best 3.0:1, worst 1.1:1
  - media_files: typical 1.05:1 (near incompressible)

  Effective capacity formula:
    effective_usable_tb = raw_usable_tb * dedup_ratio

  If compression is also enabled:
    combined_ratio = dedup_ratio * compression_ratio
    Typical compression ratios: LZ4 ~1.3:1, ZSTD ~1.6:1, Gzip ~2.0:1 (slower)

  Thin provisioning: allows overprovisioning but does not save physical space on its own.
  It defers allocation until data is written.

  Show for the user's workload type:
  1. Raw capacity (from storage config)
  2. Effective capacity after dedup (typical / best case / worst case)
  3. Effective capacity after dedup + compression (if enabled)
  4. Storage savings in TB and percentage
  5. Warning: dedup effectiveness varies greatly with data type —
     already-compressed or encrypted data (e.g., encrypted Veeam backups) will NOT deduplicate well
  6. CPU/RAM overhead note: inline dedup adds ~10-15% CPU overhead; index requires RAM
