question_id: 12
question_text: >
  Deduplication Index Resources: How much deduplication index resource is
  required for a N TB volume?

category: A
required_sections:
  - profile
  - storage_config

optional_sections:
  - compute

context_fields_used:
  - profile.total_usable_capacity_tb
  - storage_config.deduplication_enabled
  - storage_config.dedup_ratio
  - compute.total_ram_gb

prompt_additions: >
  The user wants to know how much RAM and fast storage is required for the
  deduplication index for a given volume size.

  StoneFly dedup index sizing rule (configuration-dependent):
  RAM and index storage requirements depend on: dedup pool size, block size, dedup ratio,
  number of volumes, and average volume size. There is no single fixed GB/TB ratio.

  Reference values from StoneFly dedup calculator (4KB block size, 4:1 ratio, 1 pool):
  - RAM: approximately 5 GB per 1 TB dedup pool (e.g., 1 TB pool → ~5 GB RAM)
  - Index storage (SSD/NVMe): approximately 18 GB per 1 TB dedup pool

  Always state that these are estimates for 4KB block size / 4:1 ratio configuration.
  Actual requirements may be higher or lower depending on block size and ratio.

  Calculation (use as estimate, not guarantee):
    dedup_pool_tb = total_usable_capacity_tb (or user-specified pool size)
    ram_required_gb ≈ dedup_pool_tb * 5  (GB/TB, for 4KB block, 4:1 ratio)
    ssd_index_required_gb ≈ dedup_pool_tb * 18  (GB/TB, for 4KB block, 4:1 ratio)

  Check against available RAM (compute.total_ram_gb):
  - If ram_required_gb > total_ram_gb * 0.25 (25% of total RAM),
    warn that dedup index may compete with workload RAM and cause performance degradation
  - Recommend reserving at least 50% of RAM for OS and workload VMs

  Provide:
  1. Dedup pool size input
  2. Estimated RAM required for dedup index (~5 GB/TB, 4KB/4:1 config)
  3. Estimated SSD fast storage required for index persistence (~18 GB/TB)
  4. Clearly note: actual values depend on block size and ratio — use StoneFly dedup calculator for exact sizing
  5. RAM availability check against provided compute config
  6. Recommendation: if RAM is insufficient, consider reducing dedup pool size or
     adding RAM before enabling inline dedup

  IMPORTANT: Write all math as plain text. Example: "120 TB x 5 GB/TB = 600 GB RAM".
  Never use LaTeX notation like \( \text{} \) or \( \times \).
