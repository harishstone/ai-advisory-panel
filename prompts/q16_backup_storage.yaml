question_id: 16
question_text: >
  Backup Storage Requirement: How much usable space would be required to backup
  N number of VMs occupying N TB of space across the VMs?

category: A
required_sections:
  - veeam
  - profile

optional_sections:
  - storage_config

context_fields_used:
  - veeam.daily_change_rate_pct
  - veeam.backup_copy_enabled
  - veeam.backup_copy_target
  - veeam.synthetic_full_frequency
  - veeam.per_vm_backup_files
  - veeam.backup_encryption
  - storage_config.deduplication_enabled
  - storage_config.dedup_ratio
  - storage_config.compression_enabled
  - profile.total_usable_capacity_tb
  - profile.concurrent_workloads
  - profile.avg_dataset_size_gb

prompt_additions: >
  The user wants to calculate how much backup storage is needed for their VM environment.

  IMPORTANT: Use actual values from the appliance config — do NOT use "N TB" or placeholder
  variables. Use total_usable_capacity_tb as the source data size (this is the protected dataset
  size). If daily_change_rate_pct is missing from the config, assume 5% as the default.

  Core formula (substitute real numbers from config):
    source_data_tb = total_usable_capacity_tb (from profile section)
    daily_change_tb = source_data_tb * (daily_change_rate_pct / 100)
    total_before_efficiency_7d  = source_data_tb + (daily_change_tb * 7)
    total_before_efficiency_14d = source_data_tb + (daily_change_tb * 14)
    total_before_efficiency_30d = source_data_tb + (daily_change_tb * 30)

  Apply storage efficiency if dedup/compression enabled:
    effective_storage_tb = total_before_efficiency / dedup_ratio

  Add overhead:
  - Veeam metadata overhead: +5%
  - Synthetic full storage overhead (if weekly): additional full backup worth of space per week
  - Backup Copy Job target: if enabled, double the storage requirement

  Show calculated numbers for each retention period:
  1. Source data size (TB) — from config
  2. Daily change rate assumption
  3. Total raw storage needed for 7 / 14 / 30 day retention
  4. Total storage after dedup/compression (if enabled in config)
  5. Final recommendation with 20% growth buffer
  6. Warning: if backup encryption is enabled, dedup will be ineffective

  IMPORTANT: Write all math as plain text. Example: "120 TB + (6 TB × 7) = 162 TB".
  Never use LaTeX notation.
